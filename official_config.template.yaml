proxies:
  - name: "直连"
    type: direct
    udp: true

mixed-port: 7890
bind-address: 127.0.0.1
ipv6: true
allow-lan: false
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://ghfast.top/https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - stun.*.*
    - stun.*.*.*
    - +.market.xiaomi.com

    # QQ快速登录检测
    - localhost.ptlogin2.qq.com
    - localhost.sec.qq.com
    # 微信快速登录检测
    - localhost.work.weixin.qq.com

    # Windows 网络连接检测（校园网认证相关）
    - +.msftconnecttest.com
    - +.msftncsi.com

    - connectivity-check_domain
    - private_domain
    - category-ntp_domain
    - cn_domain
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  use-hosts: false
  use-system-hosts: true
  fallback: []
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  respect-rules: true #让连接DNS服务器时能够遵循规则，也就是通过代理节点连接到上面设置的国外DNS，因为直连可能连接不上

