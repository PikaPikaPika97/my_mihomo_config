proxy-groups:
  - name: 默认
    type: select
    proxies:
      [自动选择, 直连, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点]

  - name: Gemini
    type: select
    proxies: [AI, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]

  - name: Google
    type: select
    proxies:
      [AI, 默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]

  - name: OpenAI
    type: select
    proxies: [AI, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]

  - name: Anthropic
    type: select
    proxies: [AI, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]

  - name: Telegram
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: Twitter
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: 哔哩哔哩
    type: select
    proxies:
      [直连, 默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择]

  - name: 巴哈姆特
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: YouTube
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: NETFLIX
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: Spotify
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: Github
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  - name: 其他
    type: select
    proxies:
      [默认, 香港, 台湾, 日本, 新加坡, 美国, 其它地区, 全部节点, 自动选择, 直连]

  #分隔,下面是地区分组
  - name: 香港
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)香港|香江|港|香|hk|hongkong|hong kong"

  - name: 台湾
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)台湾|台|tw|taiwan"

  - name: 日本
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)日本|东京|jp|japan"

  - name: 美国
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)美国|西美|美|us|unitedstates|united states"

  - name: 新加坡
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)新加坡|狮城|新加|狮|sg|singapore"

  - name: 其它地区
    type: select
    include-all: true
    exclude-type: direct
    filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|香港|香江|港|香|hk|hongkong|hong kong|台湾|台|tw|taiwan|日本|东京|jp|japan|新加坡|狮城|新加|狮|sg|singapore|美国|西美|美|us|unitedstates|united states)).*"

  - name: 全部节点
    type: select
    include-all: true
    exclude-type: direct

  - name: 自动选择
    type: url-test
    include-all: true
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"
    interval: 600
    tolerance: 10

  - name: AI
    type: select
    proxies:
      - AI-AUTO(无HK)
      - 美国
      - 日本
      - 新加坡
      - 台湾
      - 其它地区
      - 全部节点

  - name: AI-AUTO(无HK)
    type: url-test
    exclude-filter: "(?i)港|香|hk|hongkong|hong kong" # 排除香港地区节点
    include-all: true
    exclude-type: direct
    url: "https://www.gstatic.com/generate_204"
    interval: 600
    tolerance: 10

rules:
  # Windows 网络连接检测（校园网认证相关）- 必须直连
  - DOMAIN-SUFFIX,msftconnecttest.com,直连
  - DOMAIN-SUFFIX,msftncsi.com,直连
  - DOMAIN-SUFFIX,wscon.microsoft.com,直连

  # cpprefernece.com 连接异常，暂时加入直连
  - DOMAIN-SUFFIX,cppreference.com,直连

  - RULE-SET,private_domain,直连
  - RULE-SET,private_ip,直连,no-resolve
  #####
  - DOMAIN-SUFFIX,ping0.cc,AI
  - DOMAIN-SUFFIX,ipdata.co,AI
  - DOMAIN-SUFFIX,pingip.cn,AI
  - DOMAIN-SUFFIX,ipip.net,AI
  - DOMAIN-SUFFIX,teracloud.jp,其他
  - DOMAIN,stun.l.google.com,直连
  - DOMAIN-SUFFIX,edu.cn,直连
  - DOMAIN-SUFFIX,mathworks.com,直连
  - DOMAIN-SUFFIX,ieeexplore.ieee.org,直连
  ##### 域名分流规则区
  # AI服务专用分流
  - RULE-SET,openai_domain,OpenAI
  - RULE-SET,anthropic_domain,Anthropic
  - RULE-SET,gemini_domain,Gemini
  - RULE-SET,category-ai-!cn_domain,AI
  - RULE-SET,category-ai-cn_domain,直连
  # 其他分流
  - RULE-SET,github_domain,Github
  - RULE-SET,twitter_domain,Twitter
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,netflix_domain,NETFLIX
  - RULE-SET,bilibili_domain,哔哩哔哩
  - RULE-SET,bahamut_domain,巴哈姆特
  - RULE-SET,spotify_domain,Spotify
  - RULE-SET,category-scholar-!cn_domain,其他
  - RULE-SET,onedrive_domain,其他
  - RULE-SET,steam@cn_domain,直连
  - RULE-SET,epicgames@cn_domain,直连
  - RULE-SET,category-game-platforms-download@cn_domain,直连
  - RULE-SET,category-games@cn_domain,直连
  - RULE-SET,microsoft@cn_domain,直连
  - RULE-SET,apple-cn_domain,直连
  - RULE-SET,google_domain,Google
  ##### 国内外域名兜底分流
  - RULE-SET,geolocation-!cn,其他
  - RULE-SET,cn_domain,直连
  ##### IP分流规则区
  - RULE-SET,google_ip,Google
  - RULE-SET,netflix_ip,NETFLIX
  - RULE-SET,telegram_ip,Telegram
  - RULE-SET,twitter_ip,Twitter
  - RULE-SET,cn_ip,直连
  ##### 总体兜底规则
  - MATCH,其他

