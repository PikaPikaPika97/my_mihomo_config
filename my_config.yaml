# 需要将订阅链接填入url字段中，filter: 可填写正则表达式过滤节点，如"香港|HK|Taiwan|台湾"，additional-prefix: 可为节点名称添加前缀，如"[宝可梦|] "
proxy-providers:
  provider1:
    url: ""
    type: http
    interval: 86400
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      }
    override:
      additional-prefix: "[provider1]"

  provider2:
    url: ""
    type: http
    interval: 86400
    health-check:
      {
        enable: true,
        url: "https://www.gstatic.com/generate_204",
        interval: 300,
      }
    override:
      additional-prefix: "[provider2]"

proxies:
  - name: "直连"
    type: direct
    udp: true

mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://ghfast.top/https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

find-process-mode: strict
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

geo-auto-update: true
geo-update-interval: 24
geox-url:
  {
    geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat",
    geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat",
    mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb",
    asn: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb",
  }

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - stun.*.*
    - stun.*.*.*
    - +.market.xiaomi.com

    # QQ快速登录检测
    - localhost.ptlogin2.qq.com
    - localhost.sec.qq.com
    # 微信快速登录检测
    - localhost.work.weixin.qq.com

    - geosite:connectivity-check
    - geosite:private
    - geosite:category-ntp
  use-hosts: false
  use-system-hosts: false
  fallback: []
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  respect-rules: true #让连接DNS服务器时能够遵循规则，也就是通过代理节点连接到上面设置的国外DNS，因为直连可能连接不上

# enable: false=关闭TUN模式，true=开启（开启后为全局系统代理，需管理员权限）
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

proxy-groups:
  # PROXY: 主代理组（既可以选策略组，也可以直接选节点）
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - DIRECT
      - AI-PROXY
    use:
      - Provider1          # 把 Provider1 的所有节点也放进 PROXY，方便直接选

  # AUTO: 全局自动测速，选择最快节点（不做地区过滤）
  - name: AUTO
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    timeout: 1000
    lazy: false
    use:
      - Provider1

  # AI-PROXY: AI 服务用的总入口
  # - 可以选 AI-AUTO（自动模式）
  # - 也可以在列表里手动选任意单节点（包括香港，如果你愿意手动选）
  - name: AI-PROXY
    type: select
    proxies:
      - AI-AUTO            # 先把 AI-AUTO 放进来，作为一个可选项
    include-all: true
    exclude-type: direct

  # AI-AUTO: AI 专用的自动选择节点，排除香港地区节点
  - name: AI-AUTO
    type: url-test
    exclude-filter: "(?i)港|hk|hongkong|hong kong|香江"   # 这里做 AI 自动节点的地区过滤
    include-all: true
    exclude-type: direct
    tolerance: 10




# 规则优先级从上到下，匹配到即停止
rules:
  # ========== AI服务专用代理规则 ==========
  # AI-PROXY策略组：适用于ChatGPT、Claude等AI服务（可根据需要添加或删除）
  - DOMAIN-SUFFIX,ping0.cc,AI-PROXY
  - DOMAIN-SUFFIX,ipdata.co,AI-PROXY
  - DOMAIN-SUFFIX,pingip.cn,AI-PROXY
  # PROXY策略组：需要代理访问的域名（根据个人需求自由添加）
  - DOMAIN-SUFFIX,live.com,PROXY
  - DOMAIN-SUFFIX,teracloud.jp,PROXY
  # ========== 直连规则 ==========
  # DIRECT策略组：不走代理直接连接（根据个人需求自由添加）
  - DOMAIN-SUFFIX,msftconnecttest.com,DIRECT
  - DOMAIN-SUFFIX,msftncsi.com,DIRECT
  # - DOMAIN-SUFFIX,linux.do,DIRECT
  - DOMAIN,stun.l.google.com,DIRECT
  - DOMAIN-SUFFIX,edu.cn,DIRECT
  - DOMAIN-SUFFIX,v6.navy,DIRECT
  - DOMAIN-SUFFIX,dynv6.com,DIRECT
  - DOMAIN-SUFFIX,flowoss.com,DIRECT
  - DOMAIN-SUFFIX,mathworks.com,DIRECT
  - DOMAIN-SUFFIX,ieeexplore.ieee.org,DIRECT
  # ========== 基于GeoSite的智能分流规则 ==========
  # 以下为固定规则，一般无需修改
  # 如需调整某个服务的策略，可修改后面的策略组名称
  - GEOSITE,cursor,AI-PROXY
  - GEOSITE,telegram,PROXY
  - GEOSITE,google,AI-PROXY
  - GEOSITE,steam@cn,DIRECT
  - GEOSITE,category-games@cn,DIRECT
  - GEOSITE,category-ai-!cn,AI-PROXY
  - GEOSITE,category-ai-cn,DIRECT
  - GEOSITE,onedrive,PROXY
  - GEOSITE,private,DIRECT
  - GEOSITE,category-scholar-!cn,PROXY
  - GEOSITE,microsoft@cn,DIRECT
  - GEOSITE,apple-cn,DIRECT
  - GEOSITE,geolocation-!cn,PROXY
  - GEOSITE,CN,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - GEOIP,telegram,PROXY,no-resolve
  - GEOIP,CN,DIRECT
  # 兜底规则：以上规则都不匹配时使用PROXY代理
  - MATCH,PROXY
